<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxford 3000 — เกมฝึกคำศัพท์</title>
<style>
  :root{
    --bg:#f4f3ee;--card:#fff;--text:#23221e;--muted:#6b6a64;--line:#e3e1d8;
    --primary:#1d9e75;--primary-d:#0f6e56;--danger:#e24b4a;--danger-bg:#fcebeb;
    --success:#1d9e75;--success-bg:#e1f5ee;--accent:#534ab7;--accent-bg:#eeedfe;--radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Sarabun",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;padding:16px;
    display:flex;justify-content:center;}
  .app{width:100%;max-width:560px;}
  h1{font-size:22px;font-weight:600;margin:8px 0 4px;text-align:center;}
  .sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;}
  .hidden{display:none!important;}
  .label{font-size:13px;color:var(--muted);margin:18px 0 8px;font-weight:600;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .opt{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 14px;cursor:pointer;text-align:left;transition:.15s;font-family:inherit;}
  .opt:hover{border-color:var(--accent);transform:translateY(-2px);}
  .opt.active{background:var(--accent-bg);border-color:var(--accent);}
  .opt .t{font-weight:600;font-size:16px;}
  .opt .d{color:var(--muted);font-size:13px;}
  .opt .best{color:var(--primary-d);font-size:12px;margin-top:4px;}
  .row2{display:flex;gap:10px;}
  .row2 .opt{flex:1;}
  .btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--primary);
    color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;margin-top:18px;}
  .btn:hover{background:var(--primary-d);}
  .btn.ghost{background:var(--card);color:var(--text);border:1px solid var(--line);}
  .btn.ghost:hover{background:var(--bg);}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}
  .stats{display:flex;gap:10px;margin-bottom:16px;}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;}
  .stat .l{font-size:12px;color:var(--muted);}
  .stat .v{font-size:22px;font-weight:600;}
  .q-en{font-size:38px;font-weight:600;text-align:center;margin:6px 0 2px;}
  .q-ipa{text-align:center;color:var(--muted);font-size:15px;}
  .q-pr{text-align:center;color:var(--accent);font-size:14px;margin-bottom:6px;}
  .q-th{font-size:26px;font-weight:600;text-align:center;margin:14px 0 2px;}
  .q-hint{text-align:center;color:var(--muted);font-size:13px;margin-bottom:10px;}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
  .choice{padding:16px 12px;border:1px solid var(--line);border-radius:12px;background:var(--card);
    cursor:pointer;font-family:inherit;font-size:16px;transition:.12s;}
  .choice:hover{border-color:var(--accent);}
  .choice.correct{background:var(--success-bg);border-color:var(--success);color:var(--primary-d);}
  .choice.wrong{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}
  .feedback{text-align:center;min-height:24px;font-weight:600;margin:12px 0;font-size:15px;}
  .feedback.ok{color:var(--success);}.feedback.no{color:var(--danger);}
  .back{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;font-family:inherit;padding:0;margin-bottom:12px;}
  .end .big{font-size:44px;font-weight:600;text-align:center;margin:8px 0;}
  .end .msg{text-align:center;color:var(--muted);margin-bottom:8px;}
  .speak{background:none;border:1px solid var(--line);border-radius:10px;padding:6px 14px;
    cursor:pointer;font-family:inherit;font-size:14px;color:var(--accent);display:block;margin:8px auto 0;}
</style>
</head>
<body>
<div class="app">

  <div id="home">
    <h1>Oxford 3000 🎓</h1>
    <div class="sub">เกมฝึกคำศัพท์ 2,853 คำ จากไฟล์ MEMMOREAD</div>

    <div class="label">เลือกระดับ (CEFR)</div>
    <div class="grid" id="level-grid"></div>

    <div class="label">รูปแบบคำถาม</div>
    <div class="row2">
      <button class="opt active" data-dir="en2th"><span class="t">อังกฤษ → ไทย</span><div class="d">เห็นคำอังกฤษ ทายคำแปล</div></button>
      <button class="opt" data-dir="th2en"><span class="t">ไทย → อังกฤษ</span><div class="d">เห็นคำแปล ทายคำอังกฤษ</div></button>
    </div>

    <button class="btn" id="start-btn">เริ่มเล่น</button>
  </div>

  <div id="game" class="hidden">
    <button class="back" id="back-btn">← กลับหน้าหลัก</button>
    <div class="stats">
      <div class="stat"><div class="l">คะแนน</div><div class="v" id="score">0</div></div>
      <div class="stat"><div class="l">ถูกติดกัน</div><div class="v" id="streak">0</div></div>
      <div class="stat"><div class="l">ข้อ</div><div class="v" id="prog">1/10</div></div>
    </div>
    <div class="card">
      <div class="q-hint" id="hint">คำนี้แปลว่าอะไร?</div>
      <div class="q-en" id="q-main">—</div>
      <div class="q-ipa" id="q-ipa"></div>
      <div class="q-pr" id="q-pr"></div>
      <button class="speak hidden" id="speak-btn">🔊 ฟังเสียง</button>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn hidden" id="next-btn">ข้อต่อไป →</button>
    </div>
  </div>

  <div id="end" class="hidden">
    <div class="card end">
      <h1>จบรอบแล้ว! 🎉</h1>
      <div class="big" id="end-score">0</div>
      <div class="msg" id="end-msg"></div>
      <button class="btn" id="replay-btn">เล่นอีกรอบ</button>
      <div class="btn-row"><button class="btn ghost" id="home-btn">เปลี่ยนระดับ</button></div>
    </div>
  </div>

</div>

const ROUND = 10;
const LEVELS = ["A1","A2","B1","B2"];
const LV_DESC = {A1:"เริ่มต้น",A2:"พื้นฐาน",B1:"กลาง",B2:"กลาง-สูง"};
let level="A1", dir="en2th";
let queue=[],idx=0,score=0,streak=0,answered=false;

const $=id=>document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function byLevel(lv){return WORDS.filter(w=>w.lv===lv);}
function bestGet(){try{return parseInt(localStorage.getItem("ox_"+level+"_"+dir))||0;}catch(e){return 0;}}
function bestSet(v){try{if(v>bestGet())localStorage.setItem("ox_"+level+"_"+dir,v);}catch(e){}}

function renderHome(){
  const g=$("level-grid");g.innerHTML="";
  LEVELS.forEach(lv=>{
    const n=byLevel(lv).length;
    const b=document.createElement("button");
    b.className="opt"+(lv===level?" active":"");
    b.innerHTML=`<span class="t">${lv}</span> <span class="d">${LV_DESC[lv]}</span>
      <div class="d">${n} คำ</div>
      <div class="best">สถิติ ${(()=>{try{return parseInt(localStorage.getItem("ox_"+lv+"_"+dir))||0;}catch(e){return 0;}})()} คะแนน</div>`;
    b.onclick=()=>{level=lv;renderHome();};
    g.appendChild(b);
  });
}
document.querySelectorAll("[data-dir]").forEach(b=>{
  b.onclick=()=>{document.querySelectorAll("[data-dir]").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");dir=b.dataset.dir;renderHome();};
});

$("start-btn").onclick=()=>{
  const pool=byLevel(level);
  queue=shuffle(pool).slice(0,ROUND);
  idx=0;score=0;streak=0;
  $("home").classList.add("hidden");$("end").classList.add("hidden");$("game").classList.remove("hidden");
  $("score").textContent="0";$("streak").textContent="0";
  renderQ();
};

function speak(text){
  try{const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.9;
    speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}
}

function renderQ(){
  answered=false;
  $("feedback").textContent="";$("feedback").className="feedback";
  $("next-btn").classList.add("hidden");
  $("prog").textContent=(idx+1)+"/"+queue.length;
  const w=queue[idx];
  const pool=byLevel(level);
  let promptText, correct, distractors, getLabel;
  if(dir==="en2th"){
    $("hint").textContent="คำนี้แปลว่าอะไร?";
    $("q-main").textContent=w.en;
    $("q-ipa").textContent=w.ipa;
    $("q-pr").textContent=w.pr;
    $("speak-btn").classList.remove("hidden");
    $("speak-btn").onclick=()=>speak(w.en);
    correct=w.th;
    distractors=shuffle(pool.filter(x=>x.th!==w.th)).slice(0,3).map(x=>x.th);
  }else{
    $("hint").textContent="คำนี้ภาษาอังกฤษว่าอะไร?";
    $("q-main").textContent=w.th;
    $("q-ipa").textContent="";
    $("q-pr").textContent="";
    $("speak-btn").classList.add("hidden");
    correct=w.en;
    distractors=shuffle(pool.filter(x=>x.en!==w.en)).slice(0,3).map(x=>x.en);
  }
  const opts=shuffle([correct,...distractors]);
  const box=$("choices");box.innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="choice";b.textContent=o;
    b.onclick=()=>pick(b,o,correct,w);
    box.appendChild(b);
  });
}

function pick(btn,chosen,correct,w){
  if(answered)return;answered=true;
  document.querySelectorAll("#choices .choice").forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add("correct");
  });
  const fb=$("feedback");
  if(chosen===correct){
    score+=10+streak*2;streak++;
    fb.className="feedback ok";
    fb.textContent=streak>=3?("เยี่ยม! ถูกติดกัน "+streak+" ข้อ 🔥"):"ถูกต้อง! ✓";
    if(dir==="th2en")speak(w.en);
  }else{
    streak=0;btn.classList.add("wrong");
    fb.className="feedback no";
    fb.innerHTML="ยังไม่ถูก คำตอบคือ <b>"+correct+"</b>"+(dir==="en2th"?"":" ("+w.ipa+")");
  }
  $("score").textContent=score;$("streak").textContent=streak;
  $("next-btn").classList.remove("hidden");
}

$("next-btn").onclick=()=>{idx++;if(idx>=queue.length){endGame();return;}renderQ();};
$("back-btn").onclick=goHome;
$("replay-btn").onclick=()=>$("start-btn").click();
$("home-btn").onclick=goHome;

function endGame(){
  bestSet(score);
  $("game").classList.add("hidden");$("end").classList.remove("hidden");
  $("end-score").textContent=score+" คะแนน";
  let msg;
  if(score>=160)msg="สุดยอดมาก! แม่นยำสุดๆ";
  else if(score>=100)msg="เยี่ยม ทำได้ดีมาก";
  else msg="ดีขึ้นเรื่อยๆ ลองอีกรอบนะ สู้ๆ";
  $("end-msg").textContent=msg+" · สถิติดีสุด "+bestGet()+" คะแนน";
}
function goHome(){$("game").classList.add("hidden");$("end").classList.add("hidden");$("home").classList.remove("hidden");renderHome();}
renderHome();
