<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxford 3000 — เกมฝึกคำศัพท์</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='6'%20fill='%231a1c2e'/%3E%3Ctext%20x='16'%20y='23'%20font-family='Georgia,serif'%20font-size='20'%20font-style='italic'%20font-weight='700'%20fill='%23c0392b'%20text-anchor='middle'%3EO%3C/text%3E%3C/svg%3E">
<!-- Google Fonts preconnect for faster load -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<a href="#main-content" class="skip-link">ข้ามไปเนื้อหาหลัก</a>
<div class="app">
 <main id="main-content">

  <div id="home">
    <h1>Oxford 3000</h1>
    <div class="sub">ฝึกคำศัพท์ การฟัง และการเรียงประโยค · 2,853 คำ</div>

    <div class="label">เลือกโหมด</div>
    <div class="grid" id="mode-grid"></div>

    <div class="label">เลือกระดับ (CEFR)</div>
    <div class="grid" id="level-grid"></div>

    <div class="label" id="variant-label">รูปแบบคำถาม</div>
    <div class="row2" id="variant-row"></div>

    <button type="button" class="btn" id="start-btn">เริ่มเล่น</button>
  </div>

  <div id="game" class="hidden">
    <button type="button" class="back" id="back-btn">← กลับหน้าหลัก</button>
    <div class="stats">
      <div class="stat"><div class="l">คะแนน</div><div class="v" id="score" aria-live="polite">0</div></div>
      <div class="stat"><div class="l">ถูกติดกัน</div><div class="v" id="streak" aria-live="polite">0</div></div>
      <div class="stat"><div class="l">ข้อ</div><div class="v" id="prog" aria-live="polite">1/10</div></div>
    </div>
    <div class="card">
      <div class="q-hint" id="hint">คำนี้แปลว่าอะไร?</div>
      <div class="q-en" id="q-main">—</div>
      <div class="q-ipa" id="q-ipa"></div>
      <div class="q-pr" id="q-pr"></div>
      <button type="button" class="speak hidden" id="speak-btn" aria-label="ฟังการออกเสียงภาษาอังกฤษ"><span aria-hidden="true">🔊</span> ฟังเสียง</button>
      <div class="choices" id="choices"></div>

      <div id="sentence-area" class="hidden">
        <div class="s-prompt" id="s-prompt"></div>
        <div class="s-answer" id="s-answer"></div>
        <div class="s-bank-label">แตะคำด้านล่างเพื่อเพิ่ม</div>
        <div class="s-bank" id="s-bank"></div>
        <button type="button" class="btn" id="s-check" disabled>ตรวจคำตอบ</button>
      </div>

      <div class="feedback" id="feedback" aria-live="assertive"></div>
      <div class="s-note hidden" id="s-note" aria-live="polite"></div>
      <button type="button" class="btn hidden" id="next-btn">ข้อต่อไป →</button>
    </div>
  </div>

  <div id="end" class="hidden">
    <div class="card end" role="status" aria-live="polite">
      <h1>จบรอบแล้ว!</h1>
      <div class="big" id="end-score">0</div>
      <div class="msg" id="end-msg"></div>
      <button type="button" class="btn" id="replay-btn">เล่นอีกรอบ</button>
      <div class="btn-row"><button type="button" class="btn ghost" id="home-btn">เปลี่ยนระดับ</button></div>
    </div>
  </div>

 </main>
</div>

<script src="js/data.js"></script>
<script src="js/sentences.js"></script>
<script src="js/app.js"></script>
</body>
</html>
